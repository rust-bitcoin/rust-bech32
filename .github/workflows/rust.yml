on: [push, pull_request]

name: Continuous Integration

permissions:
  contents: read

jobs:
  Test: # 6 jobs: 3 toolchains × 2 lock files.
    name: Test - ${{ matrix.toolchain }} toolchain (${{ matrix.dep }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dep: [minimal, recent]
        toolchain: [stable, nightly, msrv]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - uses: Swatinem/rust-cache@v2
      - name: Run ${{ matrix.toolchain }} tests
        run: |
          if [ "${{ matrix.toolchain }}" = "msrv" ]; then
            MSRV="$(cargo rbmt toolchains --msrv)"
            cp "Cargo-${{ matrix.dep }}.lock" Cargo.lock
            cargo +"$MSRV" test --locked
          else
            cargo rbmt --lock-file ${{ matrix.dep }} test --toolchain ${{ matrix.toolchain }}
          fi

  Lint:
    name: Lint - nightly toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - uses: Swatinem/rust-cache@v2
      - name: Run lints
        run: cargo rbmt --lock-file recent lint

  Docs:
    name: Docs - stable toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - uses: Swatinem/rust-cache@v2
      - name: Run doc tests
        run: cargo rbmt --lock-file recent docs

  Docsrs:
    name: Docs - nightly toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - uses: Swatinem/rust-cache@v2
      - name: Run docsrs tests
        run: cargo rbmt --lock-file recent docsrs

  Format: # 1 job, run cargo fmt directly.
    name: Format - nightly toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - name: Check formatting
        run: cargo rbmt --lock-file recent fmt --check

  Bench:
    name: Bench - nightly toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@af3c2868415b17eedc808da6d0589e10b7482660 # v0.1.0
      - uses: Swatinem/rust-cache@v2
      - name: Run benches
        run: cargo rbmt --lock-file recent bench

  Embedded:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no_std with alloc
            dir: embedded/with-allocator
          - name: no_std no alloc
            dir: embedded/no-allocator
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - name: Set up QEMU
        run: sudo apt-get update -y && sudo apt-get install -y qemu-system-arm gcc-arm-none-eabi
      - name: Read nightly version from Cargo.toml
        id: nightly
        run: echo "version=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].metadata.rbmt.toolchains.nightly')" >> "$GITHUB_OUTPUT"
      - name: Checkout Toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          targets: thumbv7m-none-eabi
          toolchain: ${{ steps.nightly.outputs.version }}
      - name: Run
        env:
          RUSTFLAGS: "-C link-arg=-Tlink.x"
          CARGO_TARGET_THUMBV7M_NONE_EABI_RUNNER: "qemu-system-arm -cpu cortex-m3 -machine mps2-an385 -nographic -semihosting-config enable=on,target=native -kernel"
        run: cd ${{ matrix.dir }} && cargo run --target thumbv7m-none-eabi

  Arch32bit:
    name: Test 32-bit version
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - name: Checkout Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Add architecture i386
        run: sudo dpkg --add-architecture i386
      - name: Install i686 gcc
        run: sudo apt-get update -y && sudo apt-get install -y gcc-multilib
      - name: Install target
        run: rustup target add i686-unknown-linux-gnu
      - name: Run tests on i686
        run: cargo test --target i686-unknown-linux-gnu

  Cross:
    name: Cross test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Crate
        uses: actions/checkout@v4
      - name: Checkout Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install target
        run: rustup target add s390x-unknown-linux-gnu
      - name: install cross
        run: cargo install cross --locked
      - name: run cross test
        run: cross test --target s390x-unknown-linux-gnu
